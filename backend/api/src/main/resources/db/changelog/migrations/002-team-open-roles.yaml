databaseChangeLog:
  - changeSet:
      id: 002-create-team-open-roles-table
      author: developer
      changes:
        - createTable:
            tableName: team_open_roles
            columns:
              - column:
                  name: team_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_team_open_roles_team
                    references: teams(id)
              - column:
                  name: role
                  type: varchar(255)
