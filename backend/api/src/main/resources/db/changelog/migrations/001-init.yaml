databaseChangeLog:
  - changeSet:
      id: 001-create-teams-table
      author: developer
      changes:
        - createTable:
            tableName: teams
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: member_limit
                  type: integer
                  constraints:
                    nullable: false
